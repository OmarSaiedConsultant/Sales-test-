  .back-btn:hover { background: #ef4444; color: #fff; border-color: #ef4444; }
  .timer-box { padding: 6px 12px; border-radius: 20px; background: #1a1a2e; border: 1px solid #2a2a4a; font-weight: bold; font-size: 14px; min-width: 70px; text-align: center; }

  .progress-fill { height: 100%; background: linear-gradient(90deg, #6c63ff, #22c55e); transition: width 0.5s ease; }
  
  .question-card { background: #16162a; border: 1px solid #2a2a4a; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

// منطق اللعبة المطور (النسخة الكاملة)
let currentLevel = 0, currentQuestion = 0, score = 0, correctAnswers = 0, timer = null, timeLeft = 20, savedScores = {};

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function renderMenu() {
  const grid = document.getElementById('levelsGrid');
  grid.innerHTML = '';
  document.getElementById('totalScoreDisplay').textContent = Object.values(savedScores).reduce((a,b) => a + b, 0);
  LEVELS.forEach((lv, i) => {
    const card = document.createElement('div');
    card.className = 'level-card' + (savedScores[i] !== undefined ? ' completed' : '');
    card.innerHTML = `<div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-desc">${lv.questions.length} موقف</div>`;
    card.onclick = () => startLevel(i);
    grid.appendChild(card);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('intro').classList.add('active');
}

function startLevel(idx) {
  currentLevel = idx; currentQuestion = 0; score = 0; correctAnswers = 0;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz').classList.add('active');
  showQuestion();
}

function showQuestion() {
  clearInterval(timer); timeLeft = 20;
  const qObj = LEVELS[currentLevel].questions[currentQuestion];
  const correctAnswerText = qObj.opts[qObj.correct];
  let options = [...qObj.opts];
  shuffle(options);
  const newCorrectIndex = options.indexOf(correctAnswerText);

  document.getElementById('progressFill').style.width = (currentQuestion / LEVELS[currentLevel].questions.length * 100) + '%';
  document.getElementById('questionNumber').textContent = `الموقف رقم ${currentQuestion + 1}`;
  document.getElementById('questionText').textContent = qObj.q;
  document.getElementById('feedbackBox').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  
  const grid = document.getElementById('optionsGrid'); grid.innerHTML = '';
  options.forEach((opt, i) => {
    const btn = document.createElement('button'); btn.className = 'option-btn'; btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, newCorrectIndex, qObj.exp); 
    grid.appendChild(btn);
  });
  startTimer(newCorrectIndex, qObj.exp);
}

function startTimer(cIdx, exp) {
  const tBox = document.getElementById('timerDisplay');
  tBox.textContent = `⏱ ${timeLeft}`;
  tBox.classList.remove('urgent');
  timer = setInterval(() => {
    timeLeft--;
    tBox.textContent = `⏱ ${timeLeft}`;
    if (timeLeft <= 5) tBox.classList.add('urgent');
    if (timeLeft <= 0) { clearInterval(timer); selectAnswer(-1, cIdx, exp); }
  }, 1000);
}

function selectAnswer(idx, cIdx, exp) {
  clearInterval(timer);
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.style.pointerEvents = 'none');
  const isCorrect = idx === cIdx;
  if (idx !== -1) btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  btns[cIdx].classList.add('correct');
  if (isCorrect) { score += 10 + timeLeft; correctAnswers++; }
  document.getElementById('currentScore').textContent = score;
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'block'; 
  fb.innerHTML = `<strong>${isCorrect ? '✅ تصرف احترافي!' : '❌ محتاج تركز أكتر في التطبيق'}</strong><br>${exp}`;
  document.getElementById('nextBtn').style.display = 'block';
  if (currentQuestion === LEVELS[currentLevel].questions.length - 1) {
    document.getElementById('nextBtn').textContent = '🏁 إنهاء المستوى وحفظ النتيجة';
  } else {
    document.getElementById('nextBtn').textContent = 'السؤال التالي ←';
  }
}

function nextQuestion() {
  if (currentQuestion < LEVELS[currentLevel].questions.length - 1) { currentQuestion++; showQuestion(); }
  else { savedScores[currentLevel] = score; renderMenu(); }
}

function confirmExit() { if (confirm("خروج؟ هيتم فقدان سكور المستوى ده.")) renderMenu(); }

renderMenu();
