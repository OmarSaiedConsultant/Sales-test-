<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Training 2026 - Master Edition</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #app { width: 100%; max-width: 700px; }
  .screen { display: none; }
  .screen.active { display: block; }
  #intro { text-align: center; }
  .logo { font-size: 56px; margin-bottom: 16px; }
  .intro-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .intro-sub { color: #aaa; font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
  .levels-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .level-card { background: #1a1a2e; border: 1.5px solid #2a2a4a; border-radius: 14px; padding: 18px 12px; cursor: pointer; transition: all .2s; position: relative; text-align: center; }
  .level-card:hover { border-color: #6c63ff; transform: translateY(-2px); }
  .level-card.completed { border-color: #22c55e; }
  .level-icon { font-size: 28px; margin-bottom: 8px; }
  .level-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .level-desc { font-size: 11px; color: #888; }
  .total-score-display { background: linear-gradient(135deg, #6c63ff22, #22c55e22); border: 1px solid #6c63ff44; border-radius: 14px; padding: 16px; margin-bottom: 20px; font-size: 18px; font-weight: 700; text-align: center; }
  
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
  .quiz-actions { display: flex; gap: 8px; align-items: center; }
  .back-btn { background: #333; border: 1px solid #444; color: #ccc; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
  .back-btn:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

  .progress-bar { background: #1a1a2e; border-radius: 8px; height: 8px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #6c63ff, #a89fff); transition: width .4s ease; }
  
  .question-card { background: #1a1a2e; border: 1.5px solid #2a2a4a; border-radius: 18px; padding: 28px; margin-bottom: 16px; }
  .option-btn { width: 100%; background: #1a1a2e; border: 1.5px solid #2a2a4a; border-radius: 12px; padding: 14px 18px; font-size: 14px; color: #ccc; cursor: pointer; text-align: right; margin-bottom: 10px; font-family: inherit; transition: 0.2s; line-height: 1.4; }
  .option-btn.correct { border-color: #22c55e; background: #22c55e22; color: #4ade80; }
  .option-btn.wrong { border-color: #ef4444; background: #ef444422; color: #f87171; }
  
  .feedback-box { background: #0f0f1a; border-radius: 12px; padding: 20px; margin-bottom: 16px; font-size: 14px; display: none; border-right: 4px solid #6c63ff; line-height: 1.7; color: #ddd; }
  .next-btn { width: 100%; background: #6c63ff; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; display: none; }
</style>
</head>
<body>
<div id="app">

  <div id="intro" class="screen active">
    <div class="logo">🎯</div>
    <div class="intro-title">Sales Training 2026</div>
    <div class="intro-sub">نظام المحاكاة التفاعلي - عمر سعيد<br>اختبر قدرتك على تطبيق استراتيجيات المبيعات الحديثة</div>
    <div class="total-score-display">إجمالي النقاط: <span id="totalScoreDisplay">0</span></div>
    <div class="levels-grid" id="levelsGrid"></div>
  </div>

  <div id="quiz" class="screen">
    <div class="quiz-header">
      <div class="quiz-actions">
        <button class="back-btn" onclick="confirmExit()">🏠 خروج</button>
        <div id="quizLevelBadge" style="background:#6c63ff22; padding:6px 12px; border-radius:15px; font-size:12px; color:#a89fff;"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div id="timerDisplay" style="padding:4px 10px; border-radius:20px; background:#1a1a2e; border:1px solid #2a2a4a; font-size: 13px;">⏱ 20</div>
        <div style="background:#22c55e22; padding:6px 12px; border-radius:20px; color:#4ade80; font-size: 13px;">⭐ <span id="currentScore">0</span></div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="progressText" style="font-size:11px; color:#666; text-align:center; margin-bottom:20px;"></div>
    <div class="question-card">
      <div id="questionNumber" style="font-size:11px; color:#6c63ff; margin-bottom:8px; font-weight:bold;"></div>
      <div id="questionText" style="font-size:17px; line-height:1.6; font-weight: 500;"></div>
    </div>
    <div id="optionsGrid"></div>
    <div id="feedbackBox" class="feedback-box"></div>
    <button id="nextBtn" class="next-btn" onclick="nextQuestion()">السؤال التالي ←</button>
  </div>

</div>

<script>

        opts: ["تغيير أسعار المنافسين", "إقناع المدير بتعديل التارجت", "الروتين اليومي المخطط ومهاراتك الفنية", "تحسين حالة السوق الاقتصادية"],

      },
      {

        explain: "البيع هو 'بينج بونج'. إذا كنت أنت الوحيد الذي يضرب الكرة، فلن تبدأ اللعبة أبداً. يجب أن تسأل أسئلة مفتوحة لتدفع العميل للكلام وتكتشف 'الثغرات' التي ستبيع من خلالها." 
      },
      {

        opts: ["تقاطعه فوراً لتعود للعمل (الوقت مال)", "تسمعه باهتمام وتشاركه بضع دقائق لبناء (Rapport) ثم تعود بذكاء للموضوع", "تتجاهل كلامه ولا ترد عليه", "تنهي المكالمة"], 
        correct: 1, 
        explain: "الاجتماعي يشتري منك 'أنت' قبل أن يشتري 'المنتج'. بناء العلاقة والقبول الشخصي لديه مقدم على الأرقام. إذا أشعرته بالتقدير، سيسهل عليك إغلاق الصفقة لاحقاً." 
      },
      { 
        q: "ماذا تعني 'القيمة المدركة' (Value Perception) في مواجهة الاعتراض على السعر؟", 
        opts: ["أن السعر غالي فعلاً", "أن العميل لا يرى أن الفائدة التي سيجنيها تفوق الرقم الذي سيدفعه", "أن المنافس أرخص", "أن المنتج جودته سيئة"], 
        correct: 1, 
        explain: "الناس يدفعون آلاف الجنيهات في موبايل لأنهم يرون قيمة (برستيج، جودة) تفوق الثمن. إذا اعترض العميل على السعر، فأنت فشلت في شرح 'الفائدة' التي ستعود عليه وليس لأن سعرك مرتفع." 
      },
      { 
        q: "في أنماط العملاء، من هو الشخص الذي يكره 'الغموض' ويحتاج لخطوات واضحة؟", 
        opts: ["الموجه", "المحلل", "الاجتماعي", "المنسق"], 
        correct: 1, 
        explain: "المحلل يحتاج 'خريطة طريق'. أي غموض في عرضك سيجعله يقلق ويرفض البيعة خوفاً من المجهول. كن محدداً ودقيقاً معه." 
      },
      { 
        q: "خرافة 'المنتج هو البطل' تقتضي أن تركز في عرضك على:", 
        opts: ["مواصفات المنتج الفنية", "تاريخ الشركة", "النتائج والتحول الذي سيحدث في حياة العميل بعد الحل", "عيوب المنافس"], 
        correct: 2, 
        explain: "العميل لا يشتري 'مثقاب'، بل يشتري 'ثقباً في الحائط'. ركز على 'النتيجة النهائية' (التحول) وكيف ستبدو حياة العميل أسهل أو أفضل بفضلك." 
      },
      { 
        q: "موقف: عميل يسألك 'ليه اشتري منكم مش من المنافس؟'. الرد الاستشاري:", 
        opts: ["المنافس نصاب وبضاعته سيئة", "لا أعرف المنافس، لكننا الأفضل", "توضيح 'نقاط القوة الفريدة' التي تناسب احتياج العميل تحديداً", "تقديم خصم إضافي فوراً"], 
        correct: 2, 
        explain: "الهجوم على المنافس يقلل منك. الرد الذكي هو التركيز على 'الأنسب'. مثلاً: 'المنافس ممتاز في X، ولكن إذا كنت تبحث عن Y (وهو احتياجه)، فنحن المتخصصون في ذلك'."

  }
  // يمكن إضافة باقي المستويات (3، 4، 5، 6) بنفس هذا الأسلوب الدقيق والتطبيقي
];

// منطق اللعبة المطور
let currentLevel = 0, currentQuestion = 0, score = 0, timer = null, timeLeft = 20, savedScores = {};

// دالة خلط المصفوفات لضمان عشوائية الإجابات
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function renderMenu() {
  const grid = document.getElementById('levelsGrid');
  grid.innerHTML = '';
  document.getElementById('totalScoreDisplay').textContent = Object.values(savedScores).reduce((a,b) => a + b, 0);
  LEVELS.forEach((lv, i) => {
    const card = document.createElement('div');
    card.className = 'level-card' + (savedScores[i] !== undefined ? ' completed' : '');
    card.innerHTML = `
      <div class="level-icon">${lv.icon}</div>
      <div class="level-name">${lv.name}</div>
      <div class="level-desc">${lv.questions.length} سؤال</div>
    `;
    card.onclick = () => startLevel(i);
    grid.appendChild(card);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('intro').classList.add('active');
}

function startLevel(idx) {
  currentLevel = idx; currentQuestion = 0; score = 0;
  document.getElementById('quizLevelBadge').textContent = LEVELS[idx].name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz').classList.add('active');
  showQuestion();
}

function showQuestion() {
  clearInterval(timer); timeLeft = 20;
  const lv = LEVELS[currentLevel];
  const qObj = lv.questions[currentQuestion];
  
  // حفظ الإجابة الصحيحة الأصلية قبل الخلط
  const correctAnswerText = qObj.opts[qObj.correct];
  
  // إنشاء نسخة من الخيارات وخلطها
  let options = [...qObj.opts];
  shuffle(options);
  
  // تحديد الـ index الجديد للإجابة الصحيحة بعد الخلط
  const newCorrectIndex = options.indexOf(correctAnswerText);

  document.getElementById('progressFill').style.width = (currentQuestion / lv.questions.length * 100) + '%';
  document.getElementById('progressText').textContent = `سؤال ${currentQuestion + 1} من ${lv.questions.length}`;
  document.getElementById('questionNumber').textContent = `السؤال ${currentQuestion + 1}`;
  document.getElementById('questionText').textContent = qObj.q;
  document.getElementById('feedbackBox').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  
  const grid = document.getElementById('optionsGrid'); 
  grid.innerHTML = '';
  
  options.forEach((opt, i) => {
    const btn = document.createElement('button'); 
    btn.className = 'option-btn'; 
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, newCorrectIndex, qObj.explain); 
    grid.appendChild(btn);
  });
  
  startTimer(newCorrectIndex, qObj.explain);
}

function startTimer(correctIdx, explain) {
  document.getElementById('timerDisplay').textContent = `⏱ ${timeLeft}`;
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById('timerDisplay').textContent = `⏱ ${timeLeft}`;
    if (timeLeft <= 0) { 
      clearInterval(timer); 
      selectAnswer(-1, correctIdx, explain); 
    }
  }, 1000);
}

function selectAnswer(idx, correctIdx, explain) {
  clearInterval(timer);
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.style.pointerEvents = 'none');
  
  const isCorrect = idx === correctIdx;
  if (idx !== -1) btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  btns[correctIdx].classList.add('correct');
  
  if (isCorrect) score += 10 + timeLeft;
  document.getElementById('currentScore').textContent = score;
  
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'block'; 
  fb.innerHTML = `<strong style="color:${isCorrect ? '#4ade80' : '#f87171'}">${isCorrect ? '✅ إجابة صحيحة' : '❌ للأسف، إجابة غير دقيقة'}</strong><br>${explain}`;
  
  document.getElementById('nextBtn').style.display = 'block';
  if (currentQuestion === LEVELS[currentLevel].questions.length - 1) {
    document.getElementById('nextBtn').textContent = '🏁 إنهاء المستوى وعرض النتيجة';
  } else {
    document.getElementById('nextBtn').textContent = 'السؤال التالي ←';
  }
}

function nextQuestion() {
  if (currentQuestion < LEVELS[currentLevel].questions.length - 1) { 
    currentQuestion++; 
    showQuestion(); 
  } else { 
    savedScores[currentLevel] = score; 
    renderMenu(); 
  }
}

function confirmExit() {
  if (confirm("هل أنت متأكد من الخروج؟ سيتم فقدان تقدمك في هذا المستوى.")) {
    clearInterval(timer);
    renderMenu();
  }
}

renderMenu();
</script>
