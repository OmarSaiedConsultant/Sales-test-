let currentLevel = 0, currentQuestion = 0, score = 0, timer = null, timeLeft = 20, savedScores = {};

function renderMenu() {
  const grid = document.getElementById('levelsGrid');
  grid.innerHTML = '';
  document.getElementById('totalScoreDisplay').textContent = Object.values(savedScores).reduce((a,b) => a + b, 0);
  LEVELS.forEach((lv, i) => {
    const card = document.createElement('div');
    card.className = 'level-card' + (savedScores[i] !== undefined ? ' completed' : '');
    card.innerHTML = `<div class="level-icon">${lv.icon}</div><div class="level-name">${lv.name}</div><div class="level-desc">${lv.desc}</div>`;
    card.onclick = () => startLevel(i);
    grid.appendChild(card);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('intro').classList.add('active');
}

function startLevel(idx) {
  currentLevel = idx; currentQuestion = 0; score = 0;
  document.getElementById('quizLevelBadge').textContent = LEVELS[idx].name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz').classList.add('active');
  showQuestion();
}

function showQuestion() {
  clearInterval(timer); timeLeft = 20;
  const lv = LEVELS[currentLevel], q = lv.questions[currentQuestion];
  document.getElementById('progressFill').style.width = (currentQuestion / lv.questions.length * 100) + '%';
  document.getElementById('progressText').textContent = `سؤال ${currentQuestion + 1} من ${lv.questions.length}`;
  document.getElementById('questionNumber').textContent = `سؤال ${currentQuestion + 1}`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('feedbackBox').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  const grid = document.getElementById('optionsGrid'); grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button'); btn.className = 'option-btn'; btn.textContent = opt;
    btn.onclick = () => selectAnswer(i); grid.appendChild(btn);
  });
  startTimer();
}

function startTimer() {
  document.getElementById('timerDisplay').textContent = `⏱ ${timeLeft}`;
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById('timerDisplay').textContent = `⏱ ${timeLeft}`;
    if (timeLeft <= 0) { clearInterval(timer); selectAnswer(-1); }
  }, 1000);
}

function selectAnswer(idx) {
  clearInterval(timer);
  const q = LEVELS[currentLevel].questions[currentQuestion];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.style.pointerEvents = 'none');
  const isCorrect = idx === q.correct;
  if (idx !== -1) btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[q.correct].classList.add('correct');
  if (isCorrect) score += 10 + timeLeft;
  document.getElementById('currentScore').textContent = score;
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'block'; fb.innerHTML = `<b>${isCorrect ? '✅ صح!' : '❌ غلط!'}</b><br>${q.explain}`;
  document.getElementById('nextBtn').style.display = 'block';
  if (currentQuestion === LEVELS[currentLevel].questions.length - 1) document.getElementById('nextBtn').textContent = 'نهاية المستوى';
}

function nextQuestion() {
  if (currentQuestion < LEVELS[currentLevel].questions.length - 1) { currentQuestion++; showQuestion(); }
  else { savedScores[currentLevel] = score; renderMenu(); }
}

renderMenu();
