<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Training 2026 - Master Pro Edition</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #0b0b14; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #app { width: 100%; max-width: 700px; }
  .screen { display: none; }
  .screen.active { display: block; }
  #intro { text-align: center; }
  .logo { font-size: 60px; margin-bottom: 10px; }
  .intro-title { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 10px; letter-spacing: 1px; }
  .intro-sub { color: #888; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
  .levels-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
  .level-card { background: #16162a; border: 2px solid #2a2a4a; border-radius: 16px; padding: 20px; cursor: pointer; transition: 0.3s; text-align: center; }
  .level-card:hover { border-color: #6c63ff; transform: translateY(-5px); background: #1c1c35; }
  .level-card.completed { border-color: #22c55e; background: #064e3b22; }
  .level-icon { font-size: 35px; margin-bottom: 10px; }
  .level-name { font-size: 14px; font-weight: 700; color: #fff; }
  .level-desc { font-size: 11px; color: #666; margin-top: 5px; }
  .total-score-display { background: linear-gradient(135deg, #6c63ff11, #22c55e11); border: 1px solid #6c63ff33; border-radius: 16px; padding: 20px; margin-bottom: 25px; font-size: 20px; font-weight: 800; text-align: center; color: #a89fff; }

  /* Quiz Elements */
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .quiz-actions { display: flex; gap: 10px; align-items: center; }
  .back-btn { background: #1a1a2e; border: 1px solid #333; color: #888; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 13px; transition: 0.2s; }
  .back-btn:hover { background: #ef4444; color: #fff; border-color: #ef4444; }
  .timer-box { padding: 6px 12px; border-radius: 20px; background: #1a1a2e; border: 1px solid #2a2a4a; font-weight: bold; font-size: 14px; min-width: 70px; text-align: center; }
  .timer-box.urgent { color: #ef4444; border-color: #ef4444; animation: shake 0.5s infinite; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }

  .progress-bar { background: #1a1a2e; border-radius: 10px; height: 10px; margin-bottom: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #6c63ff, #22c55e); transition: width 0.5s ease; }
  
  .question-card { background: #16162a; border: 1px solid #2a2a4a; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .option-btn { width: 100%; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 14px; padding: 16px 20px; font-size: 15px; color: #ddd; cursor: pointer; text-align: right; margin-bottom: 12px; transition: 0.2s; line-height: 1.5; }
  .option-btn:hover:not(.disabled) { border-color: #6c63ff; background: #232342; color: #fff; }
  .option-btn.correct { border-color: #22c55e; background: #064e3b44; color: #4ade80; font-weight: bold; }
  .option-btn.wrong { border-color: #ef4444; background: #7f1d1d44; color: #f87171; }
  
  .feedback-box { background: #0f0f1a; border-radius: 15px; padding: 20px; margin-bottom: 20px; font-size: 14px; display: none; border-right: 5px solid #6c63ff; line-height: 1.8; color: #bbb; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  
  .next-btn { width: 100%; background: #6c63ff; color: #fff; border: none; border-radius: 14px; padding: 18px; font-size: 16px; font-weight: 700; cursor: pointer; display: none; box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4); }
  .next-btn:hover { background: #5a52e0; transform: translateY(-2px); }

  /* Rank Display */
  .rank-popup { text-align: center; padding: 20px; border-radius: 20px; background: #1a1a2e; border: 2px solid #6c63ff; margin-top: 20px; }
</style>
</head>
<body>
<div id="app">

  <div id="intro" class="screen active">
    <div class="logo">🦁</div>
    <div class="intro-title">Sales Master 2026</div>
    <div class="intro-sub">نظام المحاكاة والتدريب - عمر سعيد<br>كن مستعداً لمواجهة أشرس مواقف المبيعات</div>
    <div class="total-score-display">السكور الكلي: <span id="totalScoreDisplay">0</span></div>
    <div class="levels-grid" id="levelsGrid"></div>
  </div>

  <div id="quiz" class="screen">
    <div class="quiz-header">
      <div class="quiz-actions">
        <button class="back-btn" onclick="confirmExit()">🏠 خروج</button>
        <div id="quizLevelBadge" style="background:#6c63ff22; padding:6px 15px; border-radius:20px; font-size:12px; color:#a89fff; font-weight:bold;"></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div id="timerDisplay" class="timer-box">⏱ 20</div>
        <div style="background:#22c55e22; padding:6px 15px; border-radius:20px; color:#4ade80; font-weight:bold; font-size:14px;">⭐ <span id="currentScore">0</span></div>
      </div>
    </div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    <div id="progressText" style="font-size:11px; color:#555; text-align:center; margin-bottom:15px;"></div>
    <div class="question-card">
      <div id="questionNumber" style="font-size:11px; color:#6c63ff; margin-bottom:10px; font-weight:bold; letter-spacing:1px;"></div>
      <div id="questionText" style="font-size:18px; line-height:1.6;"></div>
    </div>
    <div id="optionsGrid"></div>
    <div id="feedbackBox" class="feedback-box"></div>
    <button id="nextBtn" class="next-btn" onclick="nextQuestion()">السؤال التالي ←</button>
  </div>

</div>

<script>
const LEVELS = [
  {
    id: 0,
    name: "1. العدو الأخطر",
    icon: "⚔️",
    desc: "10 أسئلة (العقلية والسيطرة)",
    questions: [
      { 
        q: "موقف: العميل يرفض سماعك ويشتكي من السعر، والشركة ترفض التعديل. أين تكمن سيطرتك الحقيقية هنا؟", 
        opts: ["محاولة إقناع المدير أن التارجت 'ظالم'", "تطوير مهارة معالجة الاعتراض (الجسر) داخل دائرة تأثيرك", "انتظار تحسن ظروف السوق الاقتصادية", "إلقاء اللوم على قسم التسويق"], 
        correct: 1, 
        exp: "حسب صفحة 10، أي طاقة تستهلكها في لوم التارجت أو الشركة هي 'وهم سيطرة'. السيلز المحترف يركز 100% من طاقته على مهاراته (جسر العبور) لأنها الشيء الوحيد الذي يملك التحكم فيه فعلياً." 
      },
      { 
        q: "ما هو التوصيف الأدق لوضع النجاة (Survival Mode) في المبيعات؟", 
        opts: ["أنه حالة من التركيز العالي لتحقيق الهدف", "أنه وضع نفسي ناتج عن ضغط مثلث (الشركة، التارجت، العميل) يجعل السيلز متوتراً ومنفعلاً", "أنه أسلوب لإغلاق الصفقات بسرعة", "أنه وضع الراحة (Safe Zone)"], 
        correct: 1, 
        exp: "الـ Survival Mode هو 'فخ' نفسي. عندما تقع فيه، يشعر العميل فوراً باحتياجك (Neediness) وتوترك، مما يهدم الثقة. السيلز الناجح هو من يخرج من هذا الوضع بالسيطرة على روتينه اليومي وأعصابه." 
      },
      { 
        q: "قاعدة الـ 1% تحسن يومي تؤدي لنتيجة تراكمية مذهلة في السنة. ما هو المحرك الأساسي لها؟", 
        opts: ["تحقيق مبيعات ضخمة مرة واحدة", "بناء عادات وروتين صغير يومي يرفع الكفاءة الفنية والنفسية", "العمل 18 ساعة يومياً بدون خطة", "تغيير الشركة كل شهر"], 
        correct: 1, 
        exp: "السيطرة تبدأ من النفس. الـ 1% ليست رقماً في المبيعات بل هي 'عادات يومية'. التحسن البسيط المستمر (Compound Effect) هو ما يجعل جسر مهاراتك أقوى 37 مرة بنهاية العام." 
      },
      { 
        q: "لماذا تسمى منطقة الأمان (Safe Zone) بالعدو الخفي للسيلز؟", 
        opts: ["لأن السيلز فيها لا يعمل أبداً", "لأنها تجعلك تقبل بالنتائج الحالية وتتوقف عن تطوير جسر مهاراتك بينما التارجت ينمو", "لأنها تجذب العملاء الصعبين", "لأنها مكان مكلف للشركة"], 
        correct: 1, 
        exp: "منطقة الأمان هي مقبرة الطموح. بمجرد أن تشعر بالاستقرار وتتوقف عن التعلّم، تزداد الفجوة بين قدراتك وبين التارجت المتزايد، حتى تكتشف فجأة أنك أصبحت غير قادر على المواكبة." 
      },
      { 
        q: "أداة (5 Whys) في صفحة 8، تهدف لمساعدتك في:", 
        opts: ["كشف كذب العميل", "الوصول للدافع الجوهري (Purpose) الذي يحركك في عملك", "تحليل مميزات المنتج الخمسة", "معرفة سبب نقص العمولة"], 
        correct: 1, 
        exp: "إذا كانت الـ 'لماذا' (هدفك الشخصي) قوية، ستتحمل الـ 'كيف' (صعوبة البيع). الـ 5 Whys تربط أرقامك في الشركة بأهدافك العميقة في الحياة، وهذا هو الوقود الحقيقي للاستمرارية." 
      },
      { 
        q: "موقف: التارجت المطلوب منك زاد للضعف (2X). ما هو التصرف 'الاستباقي' الصحيح؟", 
        opts: ["مطالبة الشركة بتقليل الرقم", "مضاعفة مهاراتك الفنية ونشاطك (Scale Up) لبناء جسر يتناسب مع الهدف الجديد", "العمل بنفس الأسلوب القديم لساعات أطول", "تجاهل الرقم والتركيز على المضمون"], 
        correct: 1, 
        exp: "تارجت كبير يحتاج 'جسر' كبير. المجهود البدني (Hard work) له حدود، لكن المهارة (Smart work) هي التي تجعلك تعبر فجوة الـ 2X بنجاح دون أن تحترق وظيفياً." 
      },
      { 
        q: "أنت تشعر بالتوتر والضغط وتتعامل مع العميل بأسلوب دفاعي. هذا يعني أنك:", 
        opts: ["في منطقة الأمان", "في وضع النجاة (Survival Mode)", "تحت تأثير 'دائرة التأثير'", "تطبق نظام الـ 1%"], 
        correct: 1, 
        exp: "عندما تخرج عن السيطرة النفسية وتصبح انفعالياً، تدخل وضع النجاة. الحل هو العودة فوراً للتركيز على 'العملية' (The Process) بدلاً من النتيجة، والسيطرة على روتينك لتهدئة أعصابك." 
      },
      { 
        q: "المعادلة: (علاقة × مهارة × دوافع) = التارجت. ماذا يحدث لو كان أحد الأركان صفراً؟", 
        opts: ["يظل التارجت ممكناً", "تصبح النتيجة صفر (فشل العملية البيعية)", "تتحسن النتائج", "لا شيء يتغير"], 
        correct: 1, 
        exp: "هذه معادلة 'ضرب'. لو كنت أمهر بائع في العالم ولكن دوافعك محطمة (صفر)، ستكون النتيجة النهائية صفراً. يجب موازنة الأركان الثلاثة يومياً." 
      },
      { 
        q: "العدو الأخطر الحقيقي ليس العميل ولا الشركة، بل هو:", 
        opts: ["المنافس", "فقدان السيطرة على العقلية والاستسلام للظروف (العقلية الضحية)", "السوق النائم", "المنتج الضعيف"], 
        correct: 1, 
        exp: "الحرب تبدأ في عقلك. إذا آمنت أنك ضحية للظروف، فقد خسرت البيعة قبل أن تبدأ. السيطرة على العقلية هي الخطوة الأولى للنجاح." 
      },
      { 
        q: "موقف: زميل لك يشتكي من سوء الحظ في المبيعات. كيف ترد عليه بمنطق الدورة؟", 
        opts: ["توافقه الرأي لتدعمه نفسياً", "تذكره بـ 'دائرة التأثير' وأن النتائج تتبع المهارة والنشاط المخطط", "تخبره أن يغير الوظيفة", "تشتكي معه للمدير"], 
        correct: 1, 
        exp: "الحظ في المبيعات هو التقاء الفرصة مع 'الاستعداد'. السيلز المحترف يصنع حظه بزيادة نشاطه ورفع كفاءة مهاراته ليكون جاهزاً عندما تظهر الفرصة." 
      }
    ]
  },
  {
    id: 1,
    name: "2. الخرافات الخمس",
    icon: "💡",
    desc: "15 سؤالاً (الوعي والأنماط)",
    questions: [
      { 
        q: "موقف: العميل سألك 'السعر كام؟' في أول دقيقة. كيف ترد بأسلوب 'ساعد متبيعش'؟", 
        opts: ["تقول السعر فوراً لتكسب ثقته", "تقول: 'السعر يعتمد على الحل الأنسب لحالتك، دعنا نفهم المشكلة أولاً لنحدد القيمة'", "تتجاهل السؤال تماماً وتكمل الشرح", "تقول: 'إحنا أرخص ناس في مصر'"], 
        correct: 1, 
        exp: "السعر بدون 'قيمة' يبدو دائماً مرتفعاً. دورك كاستشاري هو ربط الرقم بالمنفعة والتحول الذي سيحصل عليه العميل. البيع هو 'تقديم قيمة' وليس 'مفاصلة في سعر'." 
      },
      { 
        q: "خرافة 'اتكلم كتير تبيع كتير'.. ما هو البديل العلمي الصحيح؟", 
        opts: ["أن تتحدث 100% من الوقت لإقناع العميل", "قاعدة 30/70 (30% كلام موجه و 70% استماع وفهم)", "أن تصمت تماماً", "أن تتحدث 50% وتصمت 50%"], 
        correct: 1, 
        exp: "الاستماع النشط هو الذي يمنحك المعلومات (الذخيرة). كلما سمحت للعميل بالكلام، كشف لك عن نقاط ألمه (Pain points) التي ستستخدمها أنت لإقناعه لاحقاً." 
      },
      { 
        q: "موقف: تتعامل مع عميل (محلل - Analyst) متردد. ما هي أنجح وسيلة لإقناعه؟", 
        opts: ["الضغط عليه لاتخاذ قرار سريع", "تزويده بأرقام، مقارنات فنية، وتقارير موثقة (Logic)", "حكاية قصص نجاح عاطفية لعملاء آخرين", "بناء علاقة شخصية والحديث عن الهوايات"], 
        correct: 1, 
        exp: "المحلل يكره المخاطرة والغموض. هو يشتري 'بالمنطق' والدليل المكتوب. أي محاولة للضغط عليه أو استخدام العواطف ستجعله ينسحب فوراً." 
      },
      { 
        q: "ما المقصود بـ 'شنطة المنتج هو البطل' (The Hero Myth)؟", 
        opts: ["أن المنتج يجب أن يكون ممتازاً", "التركيز الخاطئ على مواصفات المنتج بدلاً من احتياج العميل (البطل الحقيقي)", "أن السيلز هو البطل", "أن الشركة هي البطل"], 
        correct: 1, 
        exp: "في البيع الاحترافي، العميل هو البطل ومنتجك هو 'الأداة' التي ستساعده في رحلته. العميل لا يهتم بمنتجك، بل يهتم بما سيفعله منتجك له." 
      },
      { 
        q: "موقف: عميل (موجه - Driver) قاطعك بخشونة قائلاً 'ادخل في المفيد'. كيف تتصرف؟", 
        opts: ["تطلب منه عدم المقاطعة لتكمل عرضك", "تعطيه النتائج النهائية والأرقام الكبرى فوراً وبثقة", "تنسحب من المكالمة لقلة ذوقه", "تحاول الدردشة معه لتلطيف الجو"], 
        correct: 1, 
        exp: "الموجه يقدر 'الوقت' و'النتائج'. الدخول في صلب الموضوع فوراً يجعله يحترمك كبائع قوي ويعتبرك 'نداً' له وليس مجرد بائع يحاول إرضاءه." 
      },
      { 
        q: "معادلة (Pain + Press + Solve = $$) تهدف إلى:",

        correct: 1, 
        exp: "الناس يهربون من 'الألم' أكثر من سعيهم وراء 'اللذة'. إذا لم يشعر العميل بوجع المشكلة الحالية (Pain)، فلن يتحرك لاتخاذ قرار الشراء مهما كان حلك رائعاً." 
      },
      { 
        q: "العميل (المنسق - Amiable) يتميز بأنه:", 
        opts: ["سريع جداً في القرار", "يبحث عن الأمان والثقة وتجنب النزاع أو المخاطرة", "يحب الأرقام المعقدة", "يبحث عن الشهرة والتميز"],

        exp: "المنسق يشتري منك 'أنت' كشخص يثق به. هو يكره الصدام والضغط. كن هادئاً، صادقاً، ووفّر له ضمانات تجعله يشعر بالأمان التام." 
      },
      { 
        q: "خرافة 'إحنا الأفضل' يتم استبدالها في الدورة بـ:", 
        opts: ["نحن الأرخص", "نحن الأنسب لحالتك واحتياجك (The Right Fit)", "نحن الأقدم", "نحن الأكثر انتشاراً"], 
        correct: 1, 
        exp: "العميل يرفض الادعاءات المطلقة (نحن الأفضل). لكنه يحترم التخصص. عندما تقول 'نحن الأنسب لهذه المشكلة'، تظهر كخبير استشاري يقدم حلولاً مخصصة." 
      },
      { 
        q: "العميل (الاجتماعي - Social) يشتري بناءً على:", 
        opts: ["الأرقام فقط", "القبول الاجتماعي، التقدير، والتميز (Status)", "الهدوء والسكينة", "التفاصيل الفنية"], 
        correct: 1, 
        exp: "الاجتماعي يحب أن يشعر أنه 'مميز' وأن اختياره سيجعله يظهر بشكل رائع أمام الآخرين. ركز معه على التقدير والظهور الاجتماعي." 
      },
      { 
        q: "موقف: العميل قال 'السعر مرتفع'. الحقيقة حسب الدورة غالباً هي:", 
        opts: ["أن العميل فقير", "أن 'القيمة المدركة' أقل من الثمن المطلوب (عدم إدراك الفائدة)", "أن المنافس أرخص بكثير", "أن السوق سيء"], 
        correct: 1, 
        exp: "الاعتراض على السعر هو صرخة من العميل تقول 'أنا لم أفهم لماذا يجب أن أدفع هذا الرقم؟'. الحل هو إعادة شرح الفوائد والتحول وليس خفض السعر." 
      },
      { 
        q: "قاعدة الـ 7 ثواني في أول المكالمة تهدف لخلق:",

        exp: "عندما يسمع العميل قائمة بـ 5 فوائد وافق عليها للتو، يصبح من المستحيل منطقياً أن يقول 'لا' في النهاية." 
      },
      { 
        q: "في الإغلاق، ماذا يعني 'الصمت الذهبي'؟", 
        opts: ["أن تصمت طول المكالمة", "أن تصمت 'تماماً' بعد طرح سؤال الإغلاق وتترك العميل يتحدث أولاً", "أن تتجاهل العميل", "لا يوجد صمت ذهبي"], 
        correct: 1, 
        exp: "بعد أن تسأل 'تحب نبدأ التنفيذ؟'، أول من يتكلم يخسر. اترك العميل يواجه ضغط الصمت ليتخذ قراره الداخلي. لا تقاطعه أبداً." 
      },
      { 
        q: "إغلاق الـ Puppy Dog Close يعتمد على فكرة:", 
        opts: ["بيع الحيوانات", "ترك العميل يجرب المنتج لفترة (Trial) مجانية ليتعلق بالقيمة ويصعب عليه التخلي عنها", "الهدوء", "لا شيء"], 
        correct: 1, 
        exp: "بمجرد أن يلمس العميل الحل ويرى النتيجة في واقعه، يصبح قرار الشراء 'تحصيل حاصل'. التجربة هي أقوى بائع في العالم." 
      },
      { 
        q: "لماذا يجب أن تطلب 'الترشيحات' حتى لو لم يشترِ العميل؟", 
        opts: ["لأنك يائس", "لأنه قد يعرف شخصاً يعاني من المشكلة التي تحلها حتى لو لم تكن مناسبة له هو الآن", "لإزعاجه", "لا تطلبها"], 
        correct: 1, 
        exp: "قد لا يكون الوقت مناسباً له، لكنه قد يكون 'مفتاحاً' لعميل أحلامك. السيلز المحترف يحول كل مكالمة لفرصة نمو." 
      },
      { 
        q: "الكلمة الأخيرة: البيع ليس موهبة فطرية بل هو:", 
        opts: ["حظ خالص", "علم، مهارة، عقلية منضبطة، وتطبيق مستمر", "تعب جسدي فقط", "موهبة تورث"], 
        correct: 1, 
        exp: "كل بائع عظيم كان في البداية بائعاً فاشلاً تعلم وطبق واصطدم بالرفض حتى بنى 'جسر مهاراته'. الاستمرارية في التعلم هي السر." 
      }
    ]
  }
];

// المحرك المطور للعبة
let currentLevel = 0, currentQuestion = 0, score = 0, correctAnswers = 0, timer = null, timeLeft = 20, savedScores = {};

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function getRank(pct) {
    if (pct >= 90) return { title: "أسد مبيعات 2026 👑", color: "#4ade80", emoji: "🦁" };
    if (pct >= 70) return { title: "وحش مبيعات 🦁", color: "#6c63ff", emoji: "⚔️" };
    if (pct >= 40) return { title: "سيلز مكافح ⚔️", color: "#f59e0b", emoji: "🏹" };
    return { title: "سيلز تحت التدريب 🐣", color: "#ef4444", emoji: "🐣" };
}

function renderMenu() {
  const grid = document.getElementById('levelsGrid');
  grid.innerHTML = '';
  const total = Object.values(savedScores).reduce((a,b) => a + b, 0);
  document.getElementById('totalScoreDisplay').textContent = total;
  
  LEVELS.forEach((lv, i) => {
    const card = document.createElement('div');
    const isDone = savedScores[i] !== undefined;
    card.className = 'level-card' + (isDone ? ' completed' : '');
    card.innerHTML = `
      <div class="level-icon">${lv.icon}</div>
      <div class="level-name">${lv.name}</div>
      <div class="level-desc">${lv.questions.length} سؤال</div>
      ${isDone ? '<div style="color:#4ade80; font-size:10px; margin-top:5px;">مكتمل ✅</div>' : ''}
    `;
    card.onclick = () => startLevel(i);
    grid.appendChild(card);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('intro').classList.add('active');
}

function startLevel(idx) {
  currentLevel = idx; currentQuestion = 0; score = 0; correctAnswers = 0;
  document.getElementById('quizLevelBadge').textContent = LEVELS[idx].name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('quiz').classList.add('active');
  showQuestion();
}

function showQuestion() {
  clearInterval(timer); timeLeft = 20;
  const lv = LEVELS[currentLevel], qObj = lv.questions[currentQuestion];
  const correctAnswerText = qObj.opts[qObj.correct];
  let options = [...qObj.opts];
  shuffle(options);
  const newCorrectIndex = options.indexOf(correctAnswerText);

  document.getElementById('progressFill').style.width = (currentQuestion / lv.questions.length * 100) + '%';
  document.getElementById('progressText').textContent = `سؤال ${currentQuestion + 1} من ${lv.questions.length}`;
  document.getElementById('questionNumber').textContent = `السؤال رقم ${currentQuestion + 1}`;
  document.getElementById('questionText').textContent = qObj.q;
  document.getElementById('feedbackBox').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  
  const grid = document.getElementById('optionsGrid'); 
  grid.innerHTML = '';
  options.forEach((opt, i) => {
    const btn = document.createElement('button'); 
    btn.className = 'option-btn'; 
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, newCorrectIndex, qObj.exp); 
    grid.appendChild(btn);
  });
  startTimer(newCorrectIndex, qObj.exp);
}

function startTimer(correctIdx, exp) {
  const tBox = document.getElementById('timerDisplay');
  tBox.textContent = `⏱ ${timeLeft}`;
  tBox.classList.remove('urgent');
  timer = setInterval(() => {
    timeLeft--;
    tBox.textContent = `⏱ ${timeLeft}`;
    if (timeLeft <= 5) tBox.classList.add('urgent');
    if (timeLeft <= 0) { clearInterval(timer); selectAnswer(-1, correctIdx, exp); }
  }, 1000);
}

function selectAnswer(idx, correctIdx, exp) {
  clearInterval(timer);
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => { b.style.pointerEvents = 'none'; b.classList.add('disabled'); });
  
  const isCorrect = idx === correctIdx;
  if (idx !== -1) btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  btns[correctIdx].classList.add('correct');
  
  if (isCorrect) { score += 10 + timeLeft; correctAnswers++; }
  document.getElementById('currentScore').textContent = score;
  
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'block'; 
  fb.innerHTML = `<strong style="color:${isCorrect ? '#4ade80' : '#f87171'}; font-size:16px;">${isCorrect ? '✅ رائع! إجابة دقيقة' : '❌ مراجعة سريعة'}</strong><br><div style="margin-top:10px;">${exp}</div>`;
  
  document.getElementById('nextBtn').style.display = 'block';
  if (currentQuestion === LEVELS[currentLevel].questions.length - 1) {
    document.getElementById('nextBtn').textContent = '🏁 عرض النتيجة النهائية للمستوى';
  } else {
    document.getElementById('nextBtn').textContent = 'السؤال التالي ←';
  }
}

function nextQuestion() {
  if (currentQuestion < LEVELS[currentLevel].questions.length - 1) { 
    currentQuestion++; 
    showQuestion(); 
  } else { 
    showFinalRank();
  }
}

function showFinalRank() {
    const pct = (correctAnswers / LEVELS[currentLevel].questions.length) * 100;
    const rank = getRank(pct);
    const fb = document.getElementById('feedbackBox');
    fb.innerHTML = `
        <div class="rank-popup">
            <div style="font-size:50px;">${rank.emoji}</div>
            <h2 style="color:${rank.color}; margin:10px 0;">${rank.title}</h2>
            <p style="color:#fff;">لقد حققت سكور: ${score}</p>
            <p style="color:#888; font-size:12px; margin-top:5px;">أجبت على ${correctAnswers} سؤال صح من أصل ${LEVELS[currentLevel].questions.length}</p>
            <button class="next-btn" style="display:block; margin-top:20px;" onclick="saveAndExit()">العودة للقائمة 🏠</button>
        </div>
    `;
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('optionsGrid').innerHTML = '';
}

function saveAndExit() {
    savedScores[currentLevel] = score;
    renderMenu();
}

function confirmExit() {
  if (confirm("هل تريد الخروج؟ ستفقد نقاطك في هذا المستوى فقط.")) {
    clearInterval(timer);
    renderMenu();
  }
}

renderMenu();
</script>
